# Development override for the Moodle stack.
# Use with:   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Provides:  a local MariaDB, a Caddy reverse proxy with mkcert TLS,
# and dev-friendly Moodle settings (debug, relaxed password policy).
#
# Override any prod env var here. Anything not redefined inherits
# from docker-compose.yml (compose merges service definitions on the
# same service name; new services are added).

services:
  moodle:
    container_name: moodle-app
    # Expose port 80 of the container as 8000 on the host for
    # direct debugging (bypass Caddy if needed). Comment out if you
    # only want to go through Caddy.
    ports:
      - "${MOODLE_HTTP_PORT:-8000}:80"
    environment:
      # In dev, Caddy fronts Moodle over HTTPS, so we tell Moodle
      # the same thing it sees in prod: HTTPS + behind a proxy.
      MOODLE_DOCKER_WEB_HOST: ${MOODLE_WEB_HOST:-moodle.local}
      MOODLE_DOCKER_WEB_PORT: ${MOODLE_HTTPS_PORT:-443}
      MOODLE_DOCKER_WEB_PROTOCOL: ${MOODLE_WEB_PROTOCOL:-https}
      MOODLE_DOCKER_BEHIND_PROXY: "1"
      MOODLE_DOCKER_DBHOST: db
      # Verbose debug output. 0 (or unset) disables it.
      MOODLE_DEBUG: "1"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - moodle-net

  db:
    image: mariadb:10.11
    container_name: moodle-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MOODLE_DB_NAME:-moodle}
      MARIADB_USER: ${MOODLE_DB_USER:-moodle}
      MARIADB_PASSWORD: ${MOODLE_DB_PASSWORD:-moodle}
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_bin
      - --innodb_file_per_table=On
      - --wait-timeout=28800
      - --skip-log-bin
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      # MariaDB's bundled healthcheck: pings the server, returns 0
      # only after InnoDB has finished initialising.
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - moodle-net

  caddy:
    image: caddy:2
    container_name: moodle-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # mkcert-generated certs. Drop them in ./docker/caddy/certs/
      # and reference them from Caddyfile.
      - ./docker/caddy/certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - moodle
    networks:
      - moodle-net

volumes:
  dbdata:
  caddy_data:
  caddy_config:

networks:
  moodle-net:
    driver: bridge
