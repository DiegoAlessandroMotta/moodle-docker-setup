services:
  moodle:
    container_name: moodle-app
    ports:
      - "${MOODLE_HTTP_PORT:-8000}:80"
    volumes:
      - moodledata:/var/www/moodledata
      - ./docker/php/zz-moodle.ini:/usr/local/etc/php/conf.d/zz-moodle.ini:ro
      - ./config.php:/var/www/html/config.php:ro
      # Hot-reload local plugins: bind-mount each plugin type into the
      # corresponding Moodle directory. Edit files in plugins/local/<name>/
      # and the changes are visible in the running container without rebuild.
      # The Dockerfile's COPY of plugins/ provides the same content in prod.
      - ./plugins/local:/var/www/html/local
      - ./plugins/mod:/var/www/html/mod
      - ./plugins/blocks:/var/www/html/blocks
      - ./plugins/theme:/var/www/html/theme
      - ./plugins/filter:/var/www/html/filter
    environment:
      MOODLE_DOCKER_WEB_HOST: ${MOODLE_WEB_HOST:-moodle.local}
      MOODLE_DOCKER_WEB_PORT: ${MOODLE_HTTPS_PORT:-443}
      MOODLE_DOCKER_WEB_PROTOCOL: ${MOODLE_WEB_PROTOCOL:-https}
      MOODLE_DOCKER_BEHIND_PROXY: "1"
      MOODLE_DOCKER_DBHOST: db
      MOODLE_DEBUG: "1"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - moodle-net

  db:
    image: mariadb:10.11
    container_name: moodle-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MOODLE_DB_NAME:-moodle}
      MARIADB_USER: ${MOODLE_DB_USER:-moodle}
      MARIADB_PASSWORD: ${MOODLE_DB_PASSWORD:-moodle}
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_bin
      - --innodb_file_per_table=On
      - --wait-timeout=28800
      - --skip-log-bin
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - moodle-net

  caddy:
    image: caddy:2
    container_name: moodle-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./docker/caddy/certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - moodle
    networks:
      - moodle-net

volumes:
  dbdata:
  caddy_data:
  caddy_config:

networks:
  moodle-net:
    driver: bridge
