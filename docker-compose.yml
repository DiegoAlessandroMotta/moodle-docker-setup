# Production / demo Moodle stack for Dokploy.
# Dokploy adds Traefik labels and the external network automatically,
# so this file stays minimal — only the application layer.
#
# Set environment variables in the Dokploy project's "Environment" tab
# (there's no .env in production). Required:
#   MOODLE_WEB_HOST          public hostname (e.g. moodle.example.com)
#   MOODLE_DB_HOST           host of the Dokploy-provisioned database
#   MOODLE_DB_NAME / _USER / _PASSWORD
# Provision the DB itself in Dokploy's "Database" tab; it will return
# the host/port/credentials to paste into the env vars above.

services:
  moodle:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
        MOODLE_TARBALL_URL: ${MOODLE_TARBALL_URL:-https://packaging.moodle.org/stable502/moodle-latest-502.tgz}
    image: moodle:${MOODLE_IMAGE_TAG:-5.2}
    restart: unless-stopped
    environment:
      MOODLE_DOCKER_DBTYPE: ${MOODLE_DB_TYPE:-mariadb}
      MOODLE_DOCKER_DBNAME: ${MOODLE_DB_NAME}
      MOODLE_DOCKER_DBUSER: ${MOODLE_DB_USER}
      MOODLE_DOCKER_DBPASS: ${MOODLE_DB_PASSWORD}
      MOODLE_DOCKER_DBHOST: ${MOODLE_DB_HOST}
      MOODLE_DOCKER_DBPORT: ${MOODLE_DB_PORT:-3306}
      MOODLE_DOCKER_DBCOLLATION: ${MOODLE_DB_COLLATION:-utf8mb4_bin}
      MOODLE_DOCKER_WEB_HOST: ${MOODLE_WEB_HOST}
      MOODLE_DOCKER_WEB_PORT: ${MOODLE_HTTPS_PORT:-443}
      MOODLE_DOCKER_WEB_PROTOCOL: ${MOODLE_WEB_PROTOCOL:-https}
      MOODLE_DOCKER_BEHIND_PROXY: "1"
      MOODLE_DEBUG: "0"
    volumes:
      # Persistent app data: cache, sessions, uploads, plugin state.
      # Back this up regularly — it's the only stateful piece.
      - moodledata:/var/www/moodledata
      # PHP overrides (zend.exception_ignore_args, etc.).
      - ./docker/php/zz-moodle.ini:/usr/local/etc/php/conf.d/zz-moodle.ini:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  moodledata:
