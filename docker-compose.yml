services:
  moodle:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
        MOODLE_TARBALL_URL: ${MOODLE_TARBALL_URL:-https://packaging.moodle.org/stable502/moodle-latest-502.tgz}
    # image: moodle:${MOODLE_IMAGE_TAG:-5.2}
    restart: unless-stopped
    environment:
      MOODLE_DOCKER_DBTYPE: ${MOODLE_DB_TYPE:-mariadb}
      MOODLE_DOCKER_DBNAME: ${MOODLE_DB_NAME}
      MOODLE_DOCKER_DBUSER: ${MOODLE_DB_USER}
      MOODLE_DOCKER_DBPASS: ${MOODLE_DB_PASSWORD}
      MOODLE_DOCKER_DBHOST: ${MOODLE_DB_HOST}
      MOODLE_DOCKER_DBPORT: ${MOODLE_DB_PORT:-3306}
      MOODLE_DOCKER_DBCOLLATION: ${MOODLE_DB_COLLATION:-utf8mb4_bin}
      MOODLE_DOCKER_WEB_HOST: ${MOODLE_WEB_HOST}
      MOODLE_DOCKER_WEB_PORT: ${MOODLE_HTTPS_PORT:-443}
      MOODLE_DOCKER_WEB_PROTOCOL: ${MOODLE_WEB_PROTOCOL:-https}
      MOODLE_DOCKER_BEHIND_PROXY: "1"
      MOODLE_DEBUG: "0"
    volumes:
      - moodledata:/var/www/moodledata
      - ./docker/php/zz-moodle.ini:/usr/local/etc/php/conf.d/zz-moodle.ini:ro
      - ./config.php:/var/www/html/config.php:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  moodledata:
