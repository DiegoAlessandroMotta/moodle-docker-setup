; Moodle-required PHP overrides.
; Loaded by PHP from /usr/local/etc/php/conf.d/ (alphabetical order).
;
; The moodlehq/moodle-php-apache entrypoint writes 20-local.ini before us,
; so anything we set here takes precedence for matching directives.

; Hides arguments from stack traces in exception output. Strongly
; recommended by the Moodle security environment check.
zend.exception_ignore_args = 1
